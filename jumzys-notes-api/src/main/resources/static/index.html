<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JumzysNotes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: rgb(10, 45, 30);
            color: #e0e0e0;
            min-height: 100vh;
        }

        header {
            background: rgb(50, 100, 50);
            padding: 20px 40px;
            border-bottom: 2px solid rgb(10, 45, 30);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.8rem;
            color: rgb(240, 230, 210);
            letter-spacing: 1px;
        }

        header p {
            color: rgb(240, 230, 210);
            font-size: 0.9rem;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .stats-bar {
            background: rgb(50, 100, 50);
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 30px;
            border: 1px solid rgb(10, 45, 30);
        }

        .stat {
            text-align: center;
        }

        .stat .number {
            font-size: 1.5rem;
            font-weight: bold;
            color: rgb(240, 230, 210);
        }

        .stat .label {
            font-size: 0.8rem;
            color: rgb(240, 230, 210);
        }

        .search-bar {
            margin-bottom: 20px;
        }

        .search-bar input {
            width: 100%;
            padding: 12px 16px;
            background: rgb(50, 100, 50);
            border: 1px solid rgb(120, 140, 100);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 1rem;
            outline: none;
        }

        .search-bar input:focus {
            border-color: rgb(240, 230, 210);
        }

        .search-bar input::placeholder {
            color: rgb(240, 230, 210);
        }

        .notes-grid {
            display: grid;
            gap: 16px;
        }

        .note-card {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.1s;
        }

        .note-card:hover {
            border-color: #e94560;
            transform: translateY(-2px);
        }

        .note-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
        }

        .note-meta {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 8px;
        }

        .note-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            background: #0f3460;
            color: #e94560;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
        }

        .note-preview {
            font-size: 0.85rem;
            color: #666;
            margin-top: 10px;
            line-height: 1.5;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 30px;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .modal h2 {
            color: #e94560;
            margin-bottom: 15px;
            font-size: 1.4rem;
        }

        .modal-meta {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        .modal-content {
            white-space: pre-wrap;
            line-height: 1.7;
            font-size: 0.95rem;
            color: #ccc;
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            background: none;
            border: none;
            color: #888;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .close-btn:hover { color: #e94560; }

        .loading {
            text-align: center;
            padding: 60px;
            color: #888;
        }

        .empty {
            text-align: center;
            padding: 60px;
            color: #555;
        }
    </style>
</head>
<body>

<header>
    <h1>📝 JumzysNotes</h1>
    <p>Your personal notes manager</p>
</header>

<div class="container">

    <div class="stats-bar">
        <div class="stat">
            <div class="number" id="total-notes">-</div>
            <div class="label">Notes</div>
        </div>
        <div class="stat">
            <div class="number" id="total-tags">-</div>
            <div class="label">Tags</div>
        </div>
    </div>

    <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search notes..." oninput="filterNotes()">
    </div>

    <div class="notes-grid" id="notes-grid">
        <div class="loading">Loading your notes...</div>
    </div>

</div>

<!-- Modal for reading a note -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal">
        <button class="close-btn" onclick="closeModal()">✕</button>
        <h2 id="modal-title"></h2>
        <div class="modal-meta" id="modal-meta"></div>
        <div class="modal-content" id="modal-content"></div>
    </div>
</div>

<script>
    let allNotes = [];

    // Parse YAML header from note content
    function parseNote(filename, rawContent) {
        const lines = rawContent.split('\n');
        const meta = { title: filename, created: '', modified: '', tags: [], body: '' };

        if (lines[0].trim() !== '---') {
            meta.body = rawContent;
            return meta;
        }

        let yamlEnd = -1;
        for (let i = 1; i < lines.length; i++) {
            if (lines[i].trim() === '---') { yamlEnd = i; break; }
        }

        if (yamlEnd === -1) { meta.body = rawContent; return meta; }

        for (let i = 1; i < yamlEnd; i++) {
            const line = lines[i];
            const colonIdx = line.indexOf(':');
            if (colonIdx === -1) continue;
            const key = line.substring(0, colonIdx).trim();
            const value = line.substring(colonIdx + 1).trim();
            if (key === 'title') meta.title = value;
            else if (key === 'created') meta.created = value;
            else if (key === 'modified') meta.modified = value;
            else if (key === 'tags') {
                meta.tags = value.replace(/[\[\]]/g, '').split(',').map(t => t.trim()).filter(Boolean);
            }
        }

        meta.body = lines.slice(yamlEnd + 1).join('\n').trim();
        return meta;
    }

    // Fetch notes from API
    async function loadNotes() {
        try {
            const response = await fetch('/api/notes');
            const data = await response.json();

            allNotes = data.map(n => parseNote(n.filename, n.content));

            updateStats();
            renderNotes(allNotes);
        } catch (err) {
            document.getElementById('notes-grid').innerHTML =
                '<div class="empty">Could not connect to notes server.</div>';
        }
    }

    // Update stats bar
    function updateStats() {
        document.getElementById('total-notes').textContent = allNotes.length;
        const allTags = new Set(allNotes.flatMap(n => n.tags));
        document.getElementById('total-tags').textContent = allTags.size;
    }

    // Render note cards
    function renderNotes(notes) {
        const grid = document.getElementById('notes-grid');
        if (notes.length === 0) {
            grid.innerHTML = '<div class="empty">No notes found.</div>';
            return;
        }

        grid.innerHTML = notes.map((note, i) => `
            <div class="note-card" onclick="openModal(${i})">
                <div class="note-title">${note.title}</div>
                <div class="note-meta">
                    ${note.modified ? 'Modified: ' + note.modified.substring(0, 10) : ''}
                </div>
                <div class="note-tags">
                    ${note.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                </div>
                ${note.body ? `<div class="note-preview">${note.body.substring(0, 100)}...</div>` : ''}
            </div>
        `).join('');
    }

    // Filter notes by search
    function filterNotes() {
        const keyword = document.getElementById('search-input').value.toLowerCase();
        const filtered = allNotes.filter(n =>
            n.title.toLowerCase().includes(keyword) ||
            n.body.toLowerCase().includes(keyword) ||
            n.tags.some(t => t.toLowerCase().includes(keyword))
        );
        renderNotes(filtered);
    }

    // Open modal
    function openModal(index) {
        const note = allNotes[index];
        document.getElementById('modal-title').textContent = note.title;
        document.getElementById('modal-meta').textContent =
            `Created: ${note.created || 'N/A'} | Modified: ${note.modified || 'N/A'}`;
        document.getElementById('modal-content').textContent = note.body;
        document.getElementById('modal-overlay').classList.add('active');
    }

    // Close modal
    function closeModal(event) {
        if (!event || event.target === document.getElementById('modal-overlay')) {
            document.getElementById('modal-overlay').classList.remove('active');
        }
    }

    // Close modal with Escape key
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
    });

    // Load notes on page load
    loadNotes();
</script>

</body>
</html>
