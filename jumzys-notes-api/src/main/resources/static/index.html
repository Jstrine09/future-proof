<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JumzysNotes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: rgb(10, 45, 30);
            color: #e0e0e0;
            min-height: 100vh;
        }

        header {
            background: rgb(50, 100, 50);
            padding: 20px 40px;
            border-bottom: 2px solid rgb(10, 45, 30);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.8rem;
            color: rgb(240, 230, 210);
            letter-spacing: 1px;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .stats-bar {
            background: rgb(50, 100, 50);
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 30px;
            border: 1px solid rgb(10, 45, 30);
        }

        .stat { text-align: center; }

        .stat .number {
            font-size: 1.5rem;
            font-weight: bold;
            color: rgb(240, 230, 210);
        }

        .stat .label {
            font-size: 0.8rem;
            color: rgb(240, 230, 210);
        }

        .search-bar { margin-bottom: 20px; }

        .search-bar input {
            width: 100%;
            padding: 12px 16px;
            background: rgb(50, 100, 50);
            border: 1px solid rgb(120, 140, 100);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 1rem;
            outline: none;
        }

        .search-bar input:focus { border-color: rgb(240, 230, 210); }
        .search-bar input::placeholder { color: rgb(240, 230, 210); }

        .notes-grid { display: grid; gap: 16px; }

        .note-card {
            background: rgb(50, 100, 50);
            border: 1px solid rgb(120, 140, 100);
            border-radius: 8px;
            padding: 20px;
            transition: border-color 0.2s, transform 0.1s;
        }

        .note-card:hover {
            border-color: rgb(240, 230, 210);
            transform: translateY(-2px);
        }

        .note-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .note-meta {
            font-size: 0.8rem;
            color: rgb(240, 230, 210);
            margin-bottom: 8px;
        }

        .note-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            background: rgb(120, 140, 100);
            color: rgb(38, 78, 38);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
        }

        .note-preview {
            font-size: 0.85rem;
            color: rgb(240, 230, 210);
            margin-top: 10px;
            line-height: 1.5;
        }

        .note-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn-edit {
            background: rgb(10, 45, 30);
            color: rgb(240, 230, 210);
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-edit:hover { background: rgb(30, 80, 50); }

        .btn-delete {
            background: rgb(120, 40, 40);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-delete:hover { background: rgb(160, 50, 50); }

        .btn-new {
            background: rgb(10, 45, 30);
            color: rgb(240, 230, 210);
            border: 1px solid rgb(240, 230, 210);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }

        .btn-new:hover { background: rgb(30, 80, 50); }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: rgb(50, 100, 50);
            border: 1px solid rgb(120, 140, 100);
            border-radius: 12px;
            padding: 30px;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .modal h2 {
            color: rgb(240, 230, 210);
            margin-bottom: 15px;
            font-size: 1.4rem;
        }

        .modal-meta {
            color: rgb(240, 230, 210);
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        .modal-content {
            white-space: pre-wrap;
            line-height: 1.7;
            font-size: 0.95rem;
            color: #ccc;
        }

        .modal input, .modal textarea {
            width: 100%;
            padding: 10px;
            background: rgb(10, 45, 30);
            border: 1px solid rgb(120, 140, 100);
            border-radius: 6px;
            color: rgb(240, 230, 210);
            font-size: 0.95rem;
            font-family: inherit;
            margin-bottom: 10px;
        }

        .modal input:focus, .modal textarea:focus {
            border-color: rgb(240, 230, 210);
            outline: none;
        }

        .modal input::placeholder, .modal textarea::placeholder {
            color: rgb(120, 140, 100);
        }

        .btn-save {
            width: 100%;
            background: rgb(10, 45, 30);
            color: rgb(240, 230, 210);
            border: 1px solid rgb(240, 230, 210);
            padding: 10px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 5px;
        }

        .btn-save:hover { background: rgb(30, 80, 50); }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            background: none;
            border: none;
            color: rgb(240, 230, 210);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .close-btn:hover { color: #fff; }

        .loading {
            text-align: center;
            padding: 60px;
            color: rgb(240, 230, 210);
        }

        .empty {
            text-align: center;
            padding: 60px;
            color: rgb(120, 140, 100);
        }
    </style>
</head>
<body>

<header>
    <h1>📝 JumzysNotes</h1>
    <div style="display:flex; gap:10px; align-items:center;">
        <button class="btn-new" onclick="showView('notes')">📝 Notes</button>
        <button class="btn-new" onclick="showView('datasets')">📊 Datasets</button>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
        <button class="btn-new" onclick="openStatsModal()">📈 Stats</button>
        <button class="btn-new" onclick="openCreateModal()" id="btn-new-note">+ New Note</button>
        <button class="btn-new" onclick="openUploadModal()" id="btn-upload-dataset" style="display:none;">+ Upload Dataset</button>
        <form action="/logout" method="post">
            <input type="hidden" name="_csrf" value="" id="csrf-token"/>
            <button type="submit" style="
                background: none;
                color: rgb(240, 230, 210);
                border: 1px solid rgb(240, 230, 210);
                padding: 10px 20px;
                border-radius: 8px;
                font-size: 1rem;
                cursor: pointer;
            ">Logout</button>
        </form>
    </div>
</header>

<div class="container">

    <div class="stats-bar">
        <div class="stat">
            <div class="number" id="total-notes">-</div>
            <div class="label">Notes</div>
        </div>
        <div class="stat">
            <div class="number" id="total-tags">-</div>
            <div class="label">Tags</div>
        </div>
    </div>

    <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search notes..." oninput="filterNotes()">
    </div>

    <div class="notes-grid" id="notes-grid">
        <div class="loading">Loading your notes...</div>
    </div>

    <div id="datasets-grid" style="display:none;">
        <div class="loading">Loading datasets...</div>
    </div>

</div>

<!-- Read Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal">
        <button class="close-btn" onclick="closeModal()">✕</button>
        <h2 id="modal-title"></h2>
        <div class="modal-meta" id="modal-meta"></div>
        <div class="modal-content" id="modal-content"></div>
    </div>
</div>

<!-- Create Modal -->
<div class="modal-overlay" id="create-modal-overlay" onclick="closeCreateModal(event)">
    <div class="modal">
        <button class="close-btn" onclick="closeCreateModal()">✕</button>
        <h2>New Note</h2>
        <input id="create-title" placeholder="Title" />
        <input id="create-tags" placeholder="Tags (comma separated)" />
        <textarea id="create-content" placeholder="Write your note here..." rows="8"></textarea>
        <button class="btn-save" onclick="submitCreate()">Save Note</button>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal-overlay" onclick="closeEditModal(event)">
    <div class="modal">
        <button class="close-btn" onclick="closeEditModal()">✕</button>
        <h2>Edit Note</h2>
        <input id="edit-title" placeholder="Title" />
        <input id="edit-tags" placeholder="Tags (comma separated)" />
        <textarea id="edit-content" placeholder="Note content..." rows="8"></textarea>
        <button class="btn-save" onclick="submitEdit()">Save Changes</button>
    </div>
</div>

<!-- Stats Modal -->
<div class="modal-overlay" id="stats-modal-overlay" onclick="closeStatsModal(event)">
    <div class="modal">
        <button class="close-btn" onclick="closeStatsModal()">✕</button>
        <h2>📊 Notes Statistics</h2>
        <div id="stats-content" style="margin-top:15px;">
            <div class="loading">Loading stats...</div>
        </div>
    </div>
</div>

<!-- Upload Dataset Modal -->
<div class="modal-overlay" id="upload-modal-overlay" onclick="closeUploadModal(event)">
    <div class="modal">
        <button class="close-btn" onclick="closeUploadModal()">✕</button>
        <h2>Upload Dataset</h2>
        <input id="upload-title" placeholder="Dataset title" />
        <input id="upload-filename" placeholder="Filename (e.g. sales.csv or data.json)" />
        <textarea id="upload-content" placeholder="Paste your CSV or JSON content here..." rows="10"></textarea>
        <button class="btn-save" onclick="submitUpload()">Upload Dataset</button>
    </div>
</div>

<script>
    let allNotes = [];
    let editingFilename = null;

    // Parse YAML header from note content
    function parseNote(filename, rawContent) {
        const lines = rawContent.split('\n');
        const meta = { filename: filename, title: filename, created: '', modified: '', tags: [], body: '' };

        if (lines[0].trim() !== '---') {
            meta.body = rawContent;
            return meta;
        }

        let yamlEnd = -1;
        for (let i = 1; i < lines.length; i++) {
            if (lines[i].trim() === '---') { yamlEnd = i; break; }
        }

        if (yamlEnd === -1) { meta.body = rawContent; return meta; }

        for (let i = 1; i < yamlEnd; i++) {
            const line = lines[i];
            const colonIdx = line.indexOf(':');
            if (colonIdx === -1) continue;
            const key = line.substring(0, colonIdx).trim();
            const value = line.substring(colonIdx + 1).trim();
            if (key === 'title') meta.title = value;
            else if (key === 'created') meta.created = value;
            else if (key === 'modified') meta.modified = value;
            else if (key === 'tags') {
                meta.tags = value.replace(/[\[\]]/g, '').split(',').map(t => t.trim()).filter(Boolean);
            }
        }

        meta.body = lines.slice(yamlEnd + 1).join('\n').trim();
        return meta;
    }

    // VIEW SWITCHING
    function showView(view) {
        if (view === 'notes') {
            document.getElementById('notes-grid').style.display = 'grid';
            document.getElementById('datasets-grid').style.display = 'none';
            document.getElementById('btn-new-note').style.display = 'block';
            document.getElementById('btn-upload-dataset').style.display = 'none';
            document.getElementById('search-input').style.display = 'block';
            loadNotes();
        } else {
            document.getElementById('notes-grid').style.display = 'none';
            document.getElementById('datasets-grid').style.display = 'block';
            document.getElementById('btn-new-note').style.display = 'none';
            document.getElementById('btn-upload-dataset').style.display = 'block';
            document.getElementById('search-input').style.display = 'none';
            loadDatasets();
        }
    }

    // Fetch notes from API
    async function loadNotes() {
        try {
            const response = await fetch('/api/notes');
            const data = await response.json();
            allNotes = data.map(n => parseNote(n.filename, n.content));
            updateStats();
            renderNotes(allNotes);
        } catch (err) {
            document.getElementById('notes-grid').innerHTML =
                '<div class="empty">Could not connect to notes server.</div>';
        }
    }

    // Update stats bar
    function updateStats() {
        document.getElementById('total-notes').textContent = allNotes.length;
        const allTags = new Set(allNotes.flatMap(n => n.tags));
        document.getElementById('total-tags').textContent = allTags.size;
    }

    // Render note cards
    function renderNotes(notes) {
        const grid = document.getElementById('notes-grid');
        if (notes.length === 0) {
            grid.innerHTML = '<div class="empty">No notes found.</div>';
            return;
        }

        grid.innerHTML = notes.map((note, i) => `
            <div class="note-card">
                <div onclick="openModal(${i})" style="cursor:pointer;">
                    <div class="note-title">${note.title}</div>
                    <div class="note-meta">
                        ${note.modified ? 'Modified: ' + note.modified.substring(0, 10) : ''}
                    </div>
                    <div class="note-tags">
                        ${note.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                    </div>
                    ${note.body ? `<div class="note-preview">${note.body.substring(0, 100)}...</div>` : ''}
                </div>
                <div class="note-actions">
                    <button class="btn-edit" onclick="openEditModal(${i})">✏️ Edit</button>
                    <button class="btn-delete" onclick="confirmDelete(${i})">🗑️ Delete</button>
                </div>
            </div>
        `).join('');
    }

    // Filter notes by search
    function filterNotes() {
        const keyword = document.getElementById('search-input').value.toLowerCase();
        const filtered = allNotes.filter(n =>
            n.title.toLowerCase().includes(keyword) ||
            n.body.toLowerCase().includes(keyword) ||
            n.tags.some(t => t.toLowerCase().includes(keyword))
        );
        renderNotes(filtered);
    }

    // READ modal
    function openModal(index) {
        const note = allNotes[index];
        document.getElementById('modal-title').textContent = note.title;
        document.getElementById('modal-meta').textContent =
            `Created: ${note.created || 'N/A'} | Modified: ${note.modified || 'N/A'}`;
        document.getElementById('modal-content').textContent = note.body;
        document.getElementById('modal-overlay').classList.add('active');
    }

    function closeModal(event) {
        if (!event || event.target === document.getElementById('modal-overlay')) {
            document.getElementById('modal-overlay').classList.remove('active');
        }
    }

    // CREATE modal
    function openCreateModal() {
        document.getElementById('create-title').value = '';
        document.getElementById('create-tags').value = '';
        document.getElementById('create-content').value = '';
        document.getElementById('create-modal-overlay').classList.add('active');
    }

    function closeCreateModal(event) {
        if (!event || event.target === document.getElementById('create-modal-overlay')) {
            document.getElementById('create-modal-overlay').classList.remove('active');
        }
    }

    async function submitCreate() {
        const title = document.getElementById('create-title').value.trim();
        const tags = document.getElementById('create-tags').value.trim();
        const content = document.getElementById('create-content').value.trim();

        if (!title) { alert('Title cannot be empty!'); return; }

        const response = await fetch('/api/notes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, tags, content })
        });

        if (response.ok) {
            closeCreateModal();
            loadNotes();
        } else {
            alert('Error creating note.');
        }
    }

    // EDIT modal
    function openEditModal(index) {
        const note = allNotes[index];
        editingFilename = note.filename;
        document.getElementById('edit-title').value = note.title;
        document.getElementById('edit-tags').value = note.tags.join(', ');
        document.getElementById('edit-content').value = note.body;
        document.getElementById('edit-modal-overlay').classList.add('active');
    }

    function closeEditModal(event) {
        if (!event || event.target === document.getElementById('edit-modal-overlay')) {
            document.getElementById('edit-modal-overlay').classList.remove('active');
        }
    }

    async function submitEdit() {
        const title = document.getElementById('edit-title').value.trim();
        const tags = document.getElementById('edit-tags').value.trim();
        const content = document.getElementById('edit-content').value.trim();

        const response = await fetch(`/api/notes/${editingFilename}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, tags, content })
        });

        if (response.ok) {
            closeEditModal();
            loadNotes();
        } else {
            alert('Error updating note.');
        }
    }

    // DELETE
    async function confirmDelete(index) {
        const note = allNotes[index];
        if (!confirm(`Delete "${note.title}"?`)) return;

        const response = await fetch(`/api/notes/${note.filename}`, {
            method: 'DELETE'
        });

        if (response.ok) {
            loadNotes();
        } else {
            alert('Error deleting note.');
        }
    }

    // DATASETS
    async function loadDatasets() {
        const grid = document.getElementById('datasets-grid');
        grid.innerHTML = '<div class="loading">Loading datasets...</div>';

        try {
            const response = await fetch('/api/datasets');
            const datasets = await response.json();

            if (datasets.length === 0) {
                grid.innerHTML = '<div class="empty">No datasets yet. Upload one!</div>';
                return;
            }

            grid.innerHTML = datasets.map(d => `
                <div class="note-card" style="margin-bottom:16px;">
                    <div class="note-title">📄 ${d.filename}</div>
                    <div class="note-meta">Size: ${Math.round(d.size / 1024 * 10) / 10} KB</div>
                    <div class="note-actions" style="margin-top:12px;">
                        <button class="btn-edit" onclick="previewDataset('${d.filename}')">👁️ Preview</button>
                        <button class="btn-delete" onclick="confirmDeleteDataset('${d.filename}')">🗑️ Delete</button>
                    </div>
                </div>
            `).join('');
        } catch (err) {
            grid.innerHTML = '<div class="empty">Could not load datasets.</div>';
        }
    }

    async function previewDataset(filename) {
        try {
            const response = await fetch(`/api/datasets/${filename}/preview`);
            const data = await response.json();

            let previewHtml = `<h2>👁️ Preview: ${filename}</h2>`;

            if (data.headers) {
                previewHtml += `
                    <div style="overflow-x:auto; margin-top:15px;">
                        <table style="width:100%; border-collapse:collapse; font-size:0.85rem;">
                            <thead>
                                <tr>
                                    ${data.headers.map(h => `
                                        <th style="padding:8px; background:rgb(10,45,30);
                                            color:rgb(240,230,210); text-align:left;
                                            border:1px solid rgb(120,140,100);">${h}</th>
                                    `).join('')}
                                </tr>
                            </thead>
                            <tbody>
                                ${data.rows.map(row => `
                                    <tr>
                                        ${row.map(cell => `
                                            <td style="padding:8px; border:1px solid rgb(120,140,100);
                                                color:#ccc;">${cell}</td>
                                        `).join('')}
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        <div style="color:rgb(120,140,100); font-size:0.8rem; margin-top:8px;">
                            Showing first 5 of ${data.totalRows} rows
                        </div>
                    </div>
                `;
            } else {
                previewHtml += `<pre style="margin-top:15px; color:#ccc;">${data.content}</pre>`;
            }

            document.getElementById('modal-title').innerHTML = '';
            document.getElementById('modal-meta').innerHTML = '';
            document.getElementById('modal-content').innerHTML = previewHtml;
            document.getElementById('modal-overlay').classList.add('active');

        } catch (err) {
            alert('Could not load preview.');
        }
    }

    async function confirmDeleteDataset(filename) {
        if (!confirm(`Delete dataset "${filename}"?`)) return;

        const response = await fetch(`/api/datasets/${filename}`, {
            method: 'DELETE'
        });

        if (response.ok) {
            loadDatasets();
        } else {
            alert('Error deleting dataset.');
        }
    }

    // UPLOAD modal
    function openUploadModal() {
        document.getElementById('upload-title').value = '';
        document.getElementById('upload-filename').value = '';
        document.getElementById('upload-content').value = '';
        document.getElementById('upload-modal-overlay').classList.add('active');
    }

    function closeUploadModal(event) {
        if (!event || event.target === document.getElementById('upload-modal-overlay')) {
            document.getElementById('upload-modal-overlay').classList.remove('active');
        }
    }

    async function submitUpload() {
        const title = document.getElementById('upload-title').value.trim();
        const filename = document.getElementById('upload-filename').value.trim();
        const content = document.getElementById('upload-content').value.trim();

        if (!filename || !content) {
            alert('Filename and content are required!');
            return;
        }

        const response = await fetch('/api/datasets', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, filename, content })
        });

        if (response.ok) {
            closeUploadModal();
            loadDatasets();
        } else {
            alert('Error uploading dataset.');
        }
    }

    // STATS modal
    async function openStatsModal() {
        document.getElementById('stats-modal-overlay').classList.add('active');
        document.getElementById('stats-content').innerHTML =
            '<div class="loading">Loading stats...</div>';

        try {
            const response = await fetch('/api/stats');
            const stats = await response.json();

            document.getElementById('stats-content').innerHTML = `
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px;">
                    <div style="background:rgb(10,45,30); padding:20px; border-radius:8px; text-align:center;">
                        <div style="font-size:2rem; font-weight:bold; color:rgb(240,230,210);">${stats.totalNotes}</div>
                        <div style="color:rgb(120,140,100); font-size:0.85rem;">Total Notes</div>
                    </div>
                    <div style="background:rgb(10,45,30); padding:20px; border-radius:8px; text-align:center;">
                        <div style="font-size:2rem; font-weight:bold; color:rgb(240,230,210);">${stats.totalTags}</div>
                        <div style="color:rgb(120,140,100); font-size:0.85rem;">Unique Tags</div>
                    </div>
                    <div style="background:rgb(10,45,30); padding:20px; border-radius:8px; text-align:center;">
                        <div style="font-size:2rem; font-weight:bold; color:rgb(240,230,210);">${stats.totalWords}</div>
                        <div style="color:rgb(120,140,100); font-size:0.85rem;">Total Words</div>
                    </div>
                    <div style="background:rgb(10,45,30); padding:20px; border-radius:8px; text-align:center;">
                        <div style="font-size:2rem; font-weight:bold; color:rgb(240,230,210);">${stats.avgWordsPerNote}</div>
                        <div style="color:rgb(120,140,100); font-size:0.85rem;">Avg Words/Note</div>
                    </div>
                </div>

                ${stats.topTags && stats.topTags.length > 0 ? `
                    <div style="background:rgb(10,45,30); padding:20px; border-radius:8px; margin-bottom:16px;">
                        <div style="color:rgb(240,230,210); font-weight:600; margin-bottom:12px;">Top Tags</div>
                        ${stats.topTags.map(t => `
                            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                                <span class="tag">${t.tag}</span>
                                <span style="color:rgb(120,140,100); font-size:0.85rem;">${t.count} note${t.count > 1 ? 's' : ''}</span>
                            </div>
                        `).join('')}
                    </div>
                ` : ''}

                <div style="background:rgb(10,45,30); padding:20px; border-radius:8px;">
                    <div style="color:rgb(240,230,210); font-weight:600; margin-bottom:12px;">Notes</div>
                    <div style="color:rgb(120,140,100); font-size:0.85rem; margin-bottom:6px;">
                        Newest: <span style="color:rgb(240,230,210);">${stats.newestNote || 'N/A'}</span>
                    </div>
                    <div style="color:rgb(120,140,100); font-size:0.85rem;">
                        Oldest: <span style="color:rgb(240,230,210);">${stats.oldestNote || 'N/A'}</span>
                    </div>
                </div>
            `;
        } catch (err) {
            document.getElementById('stats-content').innerHTML =
                '<div class="empty">Could not load stats.</div>';
        }
    }

    function closeStatsModal(event) {
        if (!event || event.target === document.getElementById('stats-modal-overlay')) {
            document.getElementById('stats-modal-overlay').classList.remove('active');
        }
    }

    // Escape key closes any open modal
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            closeModal();
            closeCreateModal();
            closeEditModal();
            closeStatsModal();
            closeUploadModal();
        }
    });

    // Fetch CSRF token for logout
    async function fetchCsrfToken() {
        const response = await fetch('/api/csrf');
        const data = await response.json();
        document.getElementById('csrf-token').value = data.token;
    }

    fetchCsrfToken();
    loadNotes();
</script>

</body>
</html>
