<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JumzysNotes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f0f0f;
            color: #d4d4d4;
            min-height: 100vh;
            position: relative;
        }

        /* Left decorative column */
        body::before {
            content: '';
            position: fixed;
            left: 0;
            top: 0;
            width: calc((100vw - 960px) / 2);
            height: 100%;
            background:
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 30px,
                    rgba(107, 15, 26, 0.08) 30px,
                    rgba(107, 15, 26, 0.08) 32px
                ),
                repeating-linear-gradient(
                    -45deg,
                    transparent,
                    transparent 30px,
                    rgba(107, 15, 26, 0.05) 30px,
                    rgba(107, 15, 26, 0.05) 32px
                );
            pointer-events: none;
            z-index: 0;
        }

        /* Right decorative column */
        body::after {
            content: '';
            position: fixed;
            right: 0;
            top: 0;
            width: calc((100vw - 960px) / 2);
            height: 100%;
            background:
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 30px,
                    rgba(107, 15, 26, 0.08) 30px,
                    rgba(107, 15, 26, 0.08) 32px
                ),
                repeating-linear-gradient(
                    -45deg,
                    transparent,
                    transparent 30px,
                    rgba(107, 15, 26, 0.05) 30px,
                    rgba(107, 15, 26, 0.05) 32px
                );
            pointer-events: none;
            z-index: 0;
        }

        header {
            background: #1a0a0a;
            padding: 20px 40px;
            border-bottom: 2px solid #6b0f1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.8rem;
            color: #c9a84c;
            letter-spacing: 2px;
            font-weight: 700;
        }

        header p { color: #888; font-size: 0.85rem; margin-top: 2px; }

        .container {
            max-width: 960px;
            margin: 40px auto;
            padding: 0 20px;
            position: relative;
            z-index: 2;
        }

        .stats-bar {
            background: #1a0a0a;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 30px;
            border: 1px solid #2a1010;
        }

        .stat { text-align: center; }
        .stat .number { font-size: 1.5rem; font-weight: bold; color: #c9a84c; }
        .stat .label { font-size: 0.8rem; color: #888; }

        .search-bar { margin-bottom: 20px; }

        .search-bar input {
            width: 100%;
            padding: 12px 16px;
            background: #1a0a0a;
            border: 1px solid #2a1010;
            border-radius: 8px;
            color: #d4d4d4;
            font-size: 1rem;
            outline: none;
        }

        .search-bar input:focus { border-color: #6b0f1a; }
        .search-bar input::placeholder { color: #555; }

        .notes-grid { display: grid; gap: 12px; }

        .note-card {
            background: #1a0a0a;
            border: 1px solid #2a1010;
            border-radius: 8px;
            padding: 18px 20px;
            transition: border-color 0.2s, transform 0.1s;
        }

        .note-card:hover { border-color: #6b0f1a; transform: translateY(-1px); }

        .note-title {
            font-size: 1rem;
            font-weight: 600;
            color: #e8e8e8;
            margin-bottom: 6px;
            cursor: pointer;
        }

        .note-title:hover { color: #c9a84c; }

        .note-meta { font-size: 0.78rem; color: #666; margin-bottom: 8px; }

        .note-tags { display: flex; flex-wrap: wrap; gap: 6px; }

        .tag {
            background: #2a1010;
            color: #c9a84c;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.72rem;
            border: 1px solid #3a1515;
        }

        .note-preview {
            font-size: 0.83rem;
            color: #666;
            margin-top: 8px;
            line-height: 1.5;
        }

        .note-actions { display: flex; gap: 8px; margin-top: 12px; }

        .btn-edit {
            background: #2a1010;
            color: #c9a84c;
            border: 1px solid #3a1515;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.82rem;
        }

        .btn-edit:hover { background: #3a1515; border-color: #c9a84c; }

        .btn-delete {
            background: #1a0505;
            color: #cc4444;
            border: 1px solid #2a0a0a;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.82rem;
        }

        .btn-delete:hover { background: #2a0a0a; border-color: #cc4444; }

        .btn-new {
            background: #1a0a0a;
            color: #c9a84c;
            border: 1px solid #6b0f1a;
            padding: 9px 18px;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .btn-new:hover { background: #2a1010; border-color: #c9a84c; }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: #1a0a0a;
            border: 1px solid #2a1010;
            border-radius: 10px;
            padding: 28px 30px;
            max-width: 680px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .modal h2 {
            color: #c9a84c;
            margin-bottom: 18px;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }

        .modal-meta { color: #666; font-size: 0.82rem; margin-bottom: 14px; }

        .modal-content {
            white-space: pre-wrap;
            line-height: 1.7;
            font-size: 0.92rem;
            color: #bbb;
        }

        .modal input, .modal textarea {
            width: 100%;
            padding: 10px 12px;
            background: #0f0f0f;
            border: 1px solid #2a1010;
            border-radius: 6px;
            color: #d4d4d4;
            font-size: 0.92rem;
            font-family: inherit;
            margin-bottom: 10px;
            outline: none;
        }

        .modal input:focus, .modal textarea:focus { border-color: #6b0f1a; }
        .modal input::placeholder, .modal textarea::placeholder { color: #444; }

        .btn-save {
            width: 100%;
            background: #6b0f1a;
            color: #c9a84c;
            border: 1px solid #8a1520;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 5px;
            letter-spacing: 0.5px;
        }

        .btn-save:hover { background: #8a1520; border-color: #c9a84c; }

        .close-btn {
            position: absolute;
            top: 14px; right: 18px;
            background: none;
            border: none;
            color: #555;
            font-size: 1.4rem;
            cursor: pointer;
        }

        .close-btn:hover { color: #c9a84c; }

        .loading { text-align: center; padding: 60px; color: #555; }
        .empty { text-align: center; padding: 60px; color: #444; }

        /* Media gallery */
        .media-section {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #2a1010;
        }

        .media-section h3 {
            color: #c9a84c;
            font-size: 0.9rem;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .media-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }

        .media-item {
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #2a1010;
            background: #0f0f0f;
        }

        .media-item img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            display: block;
            cursor: pointer;
        }

        .media-item video {
            width: 100%;
            height: 100px;
            object-fit: cover;
            display: block;
        }

        .media-item .media-delete {
            position: absolute;
            top: 4px; right: 4px;
            background: rgba(0,0,0,0.7);
            color: #cc4444;
            border: none;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 0.75rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .media-item:hover .media-delete { opacity: 1; }

        .media-item .media-name {
            font-size: 0.7rem;
            color: #666;
            padding: 4px 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .media-upload-zone {
            border: 2px dashed #2a1010;
            border-radius: 6px;
            padding: 16px;
            text-align: center;
            color: #555;
            cursor: pointer;
            font-size: 0.85rem;
            transition: border-color 0.2s;
        }

        .media-upload-zone:hover { border-color: #6b0f1a; color: #888; }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .lightbox.active { display: flex; }

        .lightbox img {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 6px;
        }

        .lightbox-close {
            position: absolute;
            top: 20px; right: 30px;
            color: #c9a84c;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f0f0f; }
        ::-webkit-scrollbar-thumb { background: #2a1010; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b0f1a; }
    </style>
</head>
<body>

<header>
    <div>
        <h1>⚽ JumzysNotes</h1>
        <p>Personal notes manager</p>
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
        <button class="btn-new" onclick="showView('notes')">📝 Notes</button>
        <button class="btn-new" onclick="showView('datasets')">📊 Datasets</button>
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
        <button class="btn-new" onclick="openStatsModal()">📈 Stats</button>
        <button class="btn-new" onclick="openCreateModal()" id="btn-new-note">+ New Note</button>
        <button class="btn-new" onclick="openUploadModal()" id="btn-upload-dataset" style="display:none;">+ Upload</button>
        <form action="/logout" method="post">
            <input type="hidden" name="_csrf" value="" id="csrf-token"/>
            <button type="submit" style="
                background:none; color:#888; border:1px solid #333;
                padding:9px 18px; border-radius:6px; font-size:0.9rem; cursor:pointer;">
                Logout
            </button>
        </form>
    </div>
</header>

<div class="container">
    <!-- Left accent bar -->
    <div style="
        position: fixed;
        left: calc((100vw - 960px) / 2 - 3px);
        top: 80px;
        width: 3px;
        height: calc(100vh - 80px);
        background: linear-gradient(to bottom,
            transparent,
            rgba(107, 15, 26, 0.4) 20%,
            rgba(201, 168, 76, 0.3) 50%,
            rgba(107, 15, 26, 0.4) 80%,
            transparent);
        pointer-events: none;
        z-index: 0;
    "></div>
    <!-- Right accent bar -->
    <div style="
        position: fixed;
        right: calc((100vw - 960px) / 2 - 3px);
        top: 80px;
        width: 3px;
        height: calc(100vh - 80px);
        background: linear-gradient(to bottom,
            transparent,
            rgba(107, 15, 26, 0.4) 20%,
            rgba(201, 168, 76, 0.3) 50%,
            rgba(107, 15, 26, 0.4) 80%,
            transparent);
        pointer-events: none;
        z-index: 0;
    ">
    </div>

    <div class="stats-bar">
        <div class="stat">
            <div class="number" id="total-notes">-</div>
            <div class="label">Notes</div>
        </div>
        <div class="stat">
            <div class="number" id="total-tags">-</div>
            <div class="label">Tags</div>
        </div>
    </div>

    <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search notes..." oninput="filterNotes()">
    </div>

    <div class="notes-grid" id="notes-grid">
        <div class="loading">Loading your notes...</div>
    </div>

    <div id="datasets-grid" style="display:none;">
        <div class="loading">Loading datasets...</div>
    </div>

</div>

<!-- Read Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal">
        <button class="close-btn" onclick="closeModal()">✕</button>
        <h2 id="modal-title"></h2>
        <div class="modal-meta" id="modal-meta"></div>
        <div class="modal-content" id="modal-content"></div>
        <!-- Media section inside read modal -->
        <div class="media-section" id="modal-media-section" style="display:none;">
            <h3>📎 Attachments</h3>
            <div class="media-gallery" id="modal-media-gallery"></div>
            <div class="media-upload-zone" onclick="document.getElementById('media-file-input').click()">
                + Add photo or video
                <input type="file" id="media-file-input" accept="image/*,video/*"
                    style="display:none;" onchange="handleMediaUpload(event)">
            </div>
        </div>
    </div>
</div>

<!-- Lightbox for full size images -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightbox-img" src="" alt="">
</div>

<!-- Create Modal -->
<div class="modal-overlay" id="create-modal-overlay" onclick="closeCreateModal(event)">
    <div class="modal">
        <button class="close-btn" onclick="closeCreateModal()">✕</button>
        <h2>New Note</h2>
        <input id="create-title" placeholder="Title" />
        <input id="create-tags" placeholder="Tags (comma separated)" />
        <textarea id="create-content" placeholder="Write your note here..." rows="8"></textarea>
        <button class="btn-save" onclick="submitCreate()">Save Note</button>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal-overlay" onclick="closeEditModal(event)">
    <div class="modal">
        <button class="close-btn" onclick="closeEditModal()">✕</button>
        <h2>Edit Note</h2>
        <input id="edit-title" placeholder="Title" />
        <input id="edit-tags" placeholder="Tags (comma separated)" />
        <textarea id="edit-content" placeholder="Note content..." rows="8"></textarea>
        <button class="btn-save" onclick="submitEdit()">Save Changes</button>
    </div>
</div>

<!-- Stats Modal -->
<div class="modal-overlay" id="stats-modal-overlay" onclick="closeStatsModal(event)">
    <div class="modal">
        <button class="close-btn" onclick="closeStatsModal()">✕</button>
        <h2>📊 Statistics</h2>
        <div id="stats-content" style="margin-top:15px;">
            <div class="loading">Loading stats...</div>
        </div>
    </div>
</div>

<!-- Upload Dataset Modal -->
<div class="modal-overlay" id="upload-modal-overlay" onclick="closeUploadModal(event)">
    <div class="modal">
        <button class="close-btn" onclick="closeUploadModal()">✕</button>
        <h2>Upload Dataset</h2>
        <input id="upload-title" placeholder="Dataset title (optional)" />
        <div id="drop-zone" style="
            border:2px dashed #2a1010; border-radius:8px; padding:40px;
            text-align:center; color:#555; margin-bottom:10px; cursor:pointer;
            transition:border-color 0.2s, background 0.2s;"
            ondragover="handleDragOver(event)"
            ondragleave="handleDragLeave(event)"
            ondrop="handleDrop(event)"
            onclick="document.getElementById('file-input').click()">
            <div style="font-size:2rem; margin-bottom:10px;">📂</div>
            <div>Drop a CSV or JSON file here</div>
            <div style="font-size:0.8rem; margin-top:5px;">or click to browse</div>
            <div style="font-size:0.75rem; margin-top:5px; color:#444;">Supports large files (GB+)</div>
            <input type="file" id="file-input" accept=".csv,.json"
                style="display:none;" onchange="handleFileSelect(event)">
        </div>
        <div id="upload-progress" style="display:none; margin-bottom:10px;">
            <div style="color:#888; font-size:0.85rem; margin-bottom:6px;">Uploading...</div>
            <div style="background:#0f0f0f; border-radius:4px; height:6px;">
                <div id="progress-bar" style="background:#6b0f1a; height:6px; border-radius:4px; width:0%; transition:width 0.3s;"></div>
            </div>
        </div>
        <button class="btn-save" onclick="submitUpload()" id="upload-btn">Upload Dataset</button>
    </div>
</div>

<script>
    let allNotes = [];
    let editingFilename = null;
    let selectedFile = null;
    let currentNoteId = null;

    function parseNote(filename, rawContent) {
        const lines = rawContent.split('\n');
        const meta = { filename, title: filename, created: '', modified: '', tags: [], body: '' };

        if (lines[0].trim() !== '---') { meta.body = rawContent; return meta; }

        let yamlEnd = -1;
        for (let i = 1; i < lines.length; i++) {
            if (lines[i].trim() === '---') { yamlEnd = i; break; }
        }

        if (yamlEnd === -1) { meta.body = rawContent; return meta; }

        for (let i = 1; i < yamlEnd; i++) {
            const line = lines[i];
            const colonIdx = line.indexOf(':');
            if (colonIdx === -1) continue;
            const key = line.substring(0, colonIdx).trim();
            const value = line.substring(colonIdx + 1).trim();
            if (key === 'title') meta.title = value;
            else if (key === 'created') meta.created = value;
            else if (key === 'modified') meta.modified = value;
            else if (key === 'tags') {
                meta.tags = value.replace(/[\[\]]/g, '').split(',').map(t => t.trim()).filter(Boolean);
            }
        }

        meta.body = lines.slice(yamlEnd + 1).join('\n').trim();
        return meta;
    }

    function showView(view) {
        if (view === 'notes') {
            document.getElementById('notes-grid').style.display = 'grid';
            document.getElementById('datasets-grid').style.display = 'none';
            document.getElementById('btn-new-note').style.display = 'block';
            document.getElementById('btn-upload-dataset').style.display = 'none';
            document.getElementById('search-input').style.display = 'block';
            loadNotes();
        } else {
            document.getElementById('notes-grid').style.display = 'none';
            document.getElementById('datasets-grid').style.display = 'block';
            document.getElementById('btn-new-note').style.display = 'none';
            document.getElementById('btn-upload-dataset').style.display = 'block';
            document.getElementById('search-input').style.display = 'none';
            loadDatasets();
        }
    }

    async function loadNotes() {
        try {
            const response = await fetch('/api/notes');
            const data = await response.json();
            allNotes = data.map(n => parseNote(n.filename, n.content));
            updateStats();
            renderNotes(allNotes);
        } catch (err) {
            document.getElementById('notes-grid').innerHTML =
                '<div class="empty">Could not connect to notes server.</div>';
        }
    }

    function updateStats() {
        document.getElementById('total-notes').textContent = allNotes.length;
        const allTags = new Set(allNotes.flatMap(n => n.tags));
        document.getElementById('total-tags').textContent = allTags.size;
    }

    function renderNotes(notes) {
        const grid = document.getElementById('notes-grid');
        if (notes.length === 0) {
            grid.innerHTML = '<div class="empty">No notes found.</div>';
            return;
        }

        grid.innerHTML = notes.map((note, i) => `
            <div class="note-card">
                <div onclick="openModal(${i})">
                    <div class="note-title">${note.title}</div>
                    <div class="note-meta">
                        ${note.modified ? 'Modified ' + note.modified.substring(0, 10) : ''}
                    </div>
                    <div class="note-tags">
                        ${note.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                    </div>
                    ${note.body ? `<div class="note-preview">${note.body.substring(0, 120)}...</div>` : ''}
                </div>
                <div class="note-actions">
                    <button class="btn-edit" onclick="openEditModal(${i})">✏️ Edit</button>
                    <button class="btn-delete" onclick="confirmDelete(${i})">🗑️ Delete</button>
                </div>
            </div>
        `).join('');
    }

    function filterNotes() {
        const keyword = document.getElementById('search-input').value.toLowerCase();
        const filtered = allNotes.filter(n =>
            n.title.toLowerCase().includes(keyword) ||
            n.body.toLowerCase().includes(keyword) ||
            n.tags.some(t => t.toLowerCase().includes(keyword))
        );
        renderNotes(filtered);
    }

    // READ modal with media
    async function openModal(index) {
        const note = allNotes[index];
        currentNoteId = note.filename;

        document.getElementById('modal-title').textContent = note.title;
        document.getElementById('modal-meta').textContent =
            `Created: ${note.created || 'N/A'} | Modified: ${note.modified || 'N/A'}`;
        document.getElementById('modal-content').textContent = note.body;
        document.getElementById('modal-overlay').classList.add('active');

        // Load media attachments
        loadMediaForNote(note.filename);
    }

    async function loadMediaForNote(noteId) {
        try {
            const response = await fetch(`/api/media/${noteId}`);
            const mediaList = await response.json();

            const section = document.getElementById('modal-media-section');
            const gallery = document.getElementById('modal-media-gallery');
            section.style.display = 'block';

            if (mediaList.length === 0) {
                gallery.innerHTML = '';
                return;
            }

            gallery.innerHTML = mediaList.map(m => `
                <div class="media-item">
                    ${m.type === 'image'
                        ? `<img src="${m.url}" alt="${m.filename}"
                            onclick="openLightbox('${m.url}')">`
                        : `<video src="${m.url}" controls></video>`
                    }
                    <button class="media-delete"
                        onclick="deleteMedia('${noteId}', '${m.filename}')">✕</button>
                    <div class="media-name">${m.filename}</div>
                </div>
            `).join('');
        } catch (err) {
            console.error('Could not load media:', err);
        }
    }

    async function handleMediaUpload(event) {
        const file = event.target.files[0];
        if (!file || !currentNoteId) return;

        const formData = new FormData();
        formData.append('file', file);

        try {
            const response = await fetch(`/api/media/${currentNoteId}`, {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                loadMediaForNote(currentNoteId);
            } else {
                alert('Error uploading media.');
            }
        } catch (err) {
            alert('Upload failed: ' + err.message);
        }

        // Reset input
        event.target.value = '';
    }

    async function deleteMedia(noteId, filename) {
        if (!confirm(`Delete "${filename}"?`)) return;

        const response = await fetch(`/api/media/${noteId}/${filename}`, {
            method: 'DELETE'
        });

        if (response.ok) {
            loadMediaForNote(noteId);
        } else {
            alert('Error deleting media.');
        }
    }

    function openLightbox(url) {
        document.getElementById('lightbox-img').src = url;
        document.getElementById('lightbox').classList.add('active');
    }

    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('active');
    }

    function closeModal(event) {
        if (!event || event.target === document.getElementById('modal-overlay')) {
            document.getElementById('modal-overlay').classList.remove('active');
            currentNoteId = null;
        }
    }

    function openCreateModal() {
        document.getElementById('create-title').value = '';
        document.getElementById('create-tags').value = '';
        document.getElementById('create-content').value = '';
        document.getElementById('create-modal-overlay').classList.add('active');
    }

    function closeCreateModal(event) {
        if (!event || event.target === document.getElementById('create-modal-overlay')) {
            document.getElementById('create-modal-overlay').classList.remove('active');
        }
    }

    async function submitCreate() {
        const title = document.getElementById('create-title').value.trim();
        const tags = document.getElementById('create-tags').value.trim();
        const content = document.getElementById('create-content').value.trim();

        if (!title) { alert('Title cannot be empty!'); return; }

        const response = await fetch('/api/notes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, tags, content })
        });

        if (response.ok) { closeCreateModal(); loadNotes(); }
        else { alert('Error creating note.'); }
    }

    function openEditModal(index) {
        const note = allNotes[index];
        editingFilename = note.filename;
        document.getElementById('edit-title').value = note.title;
        document.getElementById('edit-tags').value = note.tags.join(', ');
        document.getElementById('edit-content').value = note.body;
        document.getElementById('edit-modal-overlay').classList.add('active');
    }

    function closeEditModal(event) {
        if (!event || event.target === document.getElementById('edit-modal-overlay')) {
            document.getElementById('edit-modal-overlay').classList.remove('active');
        }
    }

    async function submitEdit() {
        const title = document.getElementById('edit-title').value.trim();
        const tags = document.getElementById('edit-tags').value.trim();
        const content = document.getElementById('edit-content').value.trim();

        const response = await fetch(`/api/notes/${editingFilename}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, tags, content })
        });

        if (response.ok) { closeEditModal(); loadNotes(); }
        else { alert('Error updating note.'); }
    }

    async function confirmDelete(index) {
        const note = allNotes[index];
        if (!confirm(`Delete "${note.title}"?`)) return;

        const response = await fetch(`/api/notes/${note.filename}`, { method: 'DELETE' });
        if (response.ok) { loadNotes(); }
        else { alert('Error deleting note.'); }
    }

    async function loadDatasets() {
        const grid = document.getElementById('datasets-grid');
        grid.innerHTML = '<div class="loading">Loading datasets...</div>';

        try {
            const response = await fetch('/api/datasets');
            const datasets = await response.json();

            if (datasets.length === 0) {
                grid.innerHTML = '<div class="empty">No datasets yet. Upload one!</div>';
                return;
            }

            grid.innerHTML = datasets.map(d => `
                <div class="note-card" style="margin-bottom:12px;">
                    <div class="note-title"
                        onclick="window.location.href='/dataset.html?file=${d.filename}'">
                        📄 ${d.filename}
                    </div>
                    <div class="note-meta">${Math.round(d.size / 1024 * 10) / 10} KB</div>
                    <div class="note-actions" style="margin-top:10px;">
                        <button class="btn-edit"
                            onclick="window.location.href='/dataset.html?file=${d.filename}'">
                            👁️ View
                        </button>
                        <button class="btn-delete"
                            onclick="confirmDeleteDataset('${d.filename}')">
                            🗑️ Delete
                        </button>
                    </div>
                </div>
            `).join('');
        } catch (err) {
            grid.innerHTML = '<div class="empty">Could not load datasets.</div>';
        }
    }

    async function confirmDeleteDataset(filename) {
        if (!confirm(`Delete dataset "${filename}"?`)) return;
        const response = await fetch(`/api/datasets/${filename}`, { method: 'DELETE' });
        if (response.ok) { loadDatasets(); }
        else { alert('Error deleting dataset.'); }
    }

    function openUploadModal() {
        selectedFile = null;
        document.getElementById('upload-title').value = '';
        document.getElementById('upload-progress').style.display = 'none';
        document.getElementById('upload-btn').disabled = false;
        document.getElementById('drop-zone').innerHTML = `
            <div style="font-size:2rem; margin-bottom:10px;">📂</div>
            <div>Drop a CSV or JSON file here</div>
            <div style="font-size:0.8rem; margin-top:5px;">or click to browse</div>
            <div style="font-size:0.75rem; margin-top:5px; color:#444;">Supports large files (GB+)</div>
            <input type="file" id="file-input" accept=".csv,.json"
                style="display:none;" onchange="handleFileSelect(event)">
        `;
        document.getElementById('upload-modal-overlay').classList.add('active');
    }

    function closeUploadModal(event) {
        if (!event || event.target === document.getElementById('upload-modal-overlay')) {
            document.getElementById('upload-modal-overlay').classList.remove('active');
        }
    }

    function handleDragOver(event) {
        event.preventDefault();
        const zone = document.getElementById('drop-zone');
        zone.style.borderColor = '#6b0f1a';
        zone.style.background = '#0f0505';
    }

    function handleDragLeave(event) {
        const zone = document.getElementById('drop-zone');
        zone.style.borderColor = '#2a1010';
        zone.style.background = 'none';
    }

    function handleDrop(event) {
        event.preventDefault();
        handleDragLeave(event);
        const file = event.dataTransfer.files[0];
        if (file) readFile(file);
    }

    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (file) readFile(file);
    }

    function readFile(file) {
        if (!file.name.endsWith('.csv') && !file.name.endsWith('.json')) {
            alert('Only CSV and JSON files are supported.');
            return;
        }

        selectedFile = file;
        const sizeMB = Math.round(file.size / 1024 / 1024 * 10) / 10;

        document.getElementById('drop-zone').innerHTML = `
            <div style="font-size:2rem; margin-bottom:10px;">✅</div>
            <div style="color:#c9a84c;">${file.name}</div>
            <div style="font-size:0.85rem; margin-top:5px; color:#666;">${sizeMB} MB — ready to upload</div>
        `;

        if (!document.getElementById('upload-title').value) {
            document.getElementById('upload-title').value = file.name.replace(/\.[^/.]+$/, '');
        }
    }

    async function submitUpload() {
        if (!selectedFile) { alert('Please select a file first!'); return; }

        const title = document.getElementById('upload-title').value.trim();
        const btn = document.getElementById('upload-btn');
        const progress = document.getElementById('upload-progress');
        const bar = document.getElementById('progress-bar');

        btn.disabled = true;
        progress.style.display = 'block';
        bar.style.width = '10%';

        const formData = new FormData();
        formData.append('file', selectedFile);
        formData.append('title', title);

        try {
            bar.style.width = '40%';
            const response = await fetch('/api/datasets/upload', {
                method: 'POST',
                body: formData
            });

            bar.style.width = '90%';
            const data = await response.json();

            if (response.ok) {
                bar.style.width = '100%';
                setTimeout(() => {
                    closeUploadModal();
                    loadDatasets();
                    const rows = data.rowCount >= 0 ? `${data.rowCount} rows` : 'unknown rows';
                    const size = Math.round(data.size / 1024 / 1024 * 10) / 10;
                    alert(`✅ Uploaded!\n${rows} — ${size} MB`);
                }, 300);
            } else {
                progress.style.display = 'none';
                btn.disabled = false;
                alert('❌ Error: ' + (data.error || 'Upload failed'));
            }
        } catch (err) {
            progress.style.display = 'none';
            btn.disabled = false;
            alert('❌ Upload failed: ' + err.message);
        }
    }

    async function openStatsModal() {
        document.getElementById('stats-modal-overlay').classList.add('active');
        document.getElementById('stats-content').innerHTML =
            '<div class="loading">Loading stats...</div>';

        try {
            const response = await fetch('/api/stats');
            const stats = await response.json();

            document.getElementById('stats-content').innerHTML = `
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;">
                    <div style="background:#0f0f0f; padding:18px; border-radius:8px; text-align:center; border:1px solid #2a1010;">
                        <div style="font-size:2rem; font-weight:bold; color:#c9a84c;">${stats.totalNotes}</div>
                        <div style="color:#666; font-size:0.82rem;">Total Notes</div>
                    </div>
                    <div style="background:#0f0f0f; padding:18px; border-radius:8px; text-align:center; border:1px solid #2a1010;">
                        <div style="font-size:2rem; font-weight:bold; color:#c9a84c;">${stats.totalTags}</div>
                        <div style="color:#666; font-size:0.82rem;">Unique Tags</div>
                    </div>
                    <div style="background:#0f0f0f; padding:18px; border-radius:8px; text-align:center; border:1px solid #2a1010;">
                        <div style="font-size:2rem; font-weight:bold; color:#c9a84c;">${stats.totalWords}</div>
                        <div style="color:#666; font-size:0.82rem;">Total Words</div>
                    </div>
                    <div style="background:#0f0f0f; padding:18px; border-radius:8px; text-align:center; border:1px solid #2a1010;">
                        <div style="font-size:2rem; font-weight:bold; color:#c9a84c;">${stats.avgWordsPerNote}</div>
                        <div style="color:#666; font-size:0.82rem;">Avg Words/Note</div>
                    </div>
                </div>
                ${stats.topTags && stats.topTags.length > 0 ? `
                    <div style="background:#0f0f0f; padding:18px; border-radius:8px; margin-bottom:12px; border:1px solid #2a1010;">
                        <div style="color:#c9a84c; font-weight:600; margin-bottom:12px; font-size:0.9rem;">Top Tags</div>
                        ${stats.topTags.map(t => `
                            <div style="display:flex; justify-content:space-between; margin-bottom:8px; align-items:center;">
                                <span class="tag">${t.tag}</span>
                                <span style="color:#555; font-size:0.82rem;">${t.count} note${t.count > 1 ? 's' : ''}</span>
                            </div>
                        `).join('')}
                    </div>
                ` : ''}
                <div style="background:#0f0f0f; padding:18px; border-radius:8px; border:1px solid #2a1010;">
                    <div style="color:#c9a84c; font-weight:600; margin-bottom:10px; font-size:0.9rem;">Recent Activity</div>
                    <div style="color:#555; font-size:0.82rem; margin-bottom:6px;">
                        Newest: <span style="color:#bbb;">${stats.newestNote || 'N/A'}</span>
                    </div>
                    <div style="color:#555; font-size:0.82rem;">
                        Oldest: <span style="color:#bbb;">${stats.oldestNote || 'N/A'}</span>
                    </div>
                </div>
            `;
        } catch (err) {
            document.getElementById('stats-content').innerHTML =
                '<div class="empty">Could not load stats.</div>';
        }
    }

    function closeStatsModal(event) {
        if (!event || event.target === document.getElementById('stats-modal-overlay')) {
            document.getElementById('stats-modal-overlay').classList.remove('active');
        }
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            closeModal();
            closeCreateModal();
            closeEditModal();
            closeStatsModal();
            closeUploadModal();
            closeLightbox();
        }
    });

    async function fetchCsrfToken() {
        const response = await fetch('/api/csrf');
        const data = await response.json();
        document.getElementById('csrf-token').value = data.token;
    }

    fetchCsrfToken();
    loadNotes();
</script>

</body>
</html>
