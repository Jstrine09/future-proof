<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataset Viewer - JumzysNotes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f0f0f;
            color: #d4d4d4;
            min-height: 100vh;
        }

        header {
            background: #1a0a0a;
            padding: 20px 40px;
            border-bottom: 2px solid #6b0f1a;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            background: #1a0a0a;
            color: #c9a84c;
            border: 1px solid #6b0f1a;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, border-color 0.2s;
        }

        .back-btn:hover {
            background: #2a1010;
            border-color: #c9a84c;
        }

        header h1 {
            font-size: 1.4rem;
            color: #c9a84c;
            letter-spacing: 1px;
        }

        header p {
            font-size: 0.82rem;
            color: #666;
            margin-top: 4px;
        }

        .container {
            padding: 30px 40px;
        }

        .meta-bar {
            background: #1a0a0a;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 30px;
            border: 1px solid #2a1010;
        }

        .meta-item { text-align: center; }

        .meta-item .number {
            font-size: 1.3rem;
            font-weight: bold;
            color: #c9a84c;
        }

        .meta-item .label {
            font-size: 0.8rem;
            color: #666;
        }

        .search-bar { margin-bottom: 20px; }

        .search-bar input {
            width: 100%;
            padding: 12px 16px;
            background: #1a0a0a;
            border: 1px solid #2a1010;
            border-radius: 8px;
            color: #d4d4d4;
            font-size: 1rem;
            outline: none;
        }

        .search-bar input:focus { border-color: #6b0f1a; }
        .search-bar input::placeholder { color: #555; }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #2a1010;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }

        thead tr {
            background: #0f0505;
            position: sticky;
            top: 0;
        }

        th {
            padding: 12px 16px;
            color: #c9a84c;
            text-align: left;
            border-bottom: 2px solid #2a1010;
            border-right: 1px solid #2a1010;
            white-space: nowrap;
            cursor: pointer;
            letter-spacing: 0.5px;
            font-size: 0.82rem;
        }

        th:hover { background: #1a0505; }

        td {
            padding: 9px 16px;
            border-bottom: 1px solid #1a0a0a;
            border-right: 1px solid #1a0a0a;
            color: #bbb;
        }

        tr:hover td { background: #1a0a0a; }
        tr:nth-child(even) td { background: #0f0505; }
        tr:nth-child(even):hover td { background: #1a0a0a; }

        .json-view {
            background: #1a0a0a;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #2a1010;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.88rem;
            color: #bbb;
            max-height: 70vh;
            overflow-y: auto;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #555;
        }

        .row-count {
            color: #555;
            font-size: 0.82rem;
            margin-top: 10px;
            text-align: right;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f0f0f; }
        ::-webkit-scrollbar-thumb { background: #2a1010; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b0f1a; }
    </style>
</head>
<body>

<header>
    <a href="/" class="back-btn">← Back</a>
    <div>
        <h1 id="page-title">Loading...</h1>
        <p id="page-meta"></p>
    </div>
</header>

<div class="container">

    <div class="meta-bar" id="meta-bar" style="display:none;">
        <div class="meta-item">
            <div class="number" id="meta-rows">-</div>
            <div class="label">Rows</div>
        </div>
        <div class="meta-item">
            <div class="number" id="meta-cols">-</div>
            <div class="label">Columns</div>
        </div>
        <div class="meta-item">
            <div class="number" id="meta-size">-</div>
            <div class="label">KB</div>
        </div>
    </div>

    <div class="search-bar" id="search-bar" style="display:none;">
        <input type="text" id="search-input" placeholder="Filter rows..." oninput="filterRows()">
    </div>

    <div id="content">
        <div class="loading">Loading dataset...</div>
    </div>

</div>

<script>
    let allRows = [];
    let headers = [];
    let sortAsc = true;
    let lastSortCol = -1;

    const params = new URLSearchParams(window.location.search);
    const filename = params.get('file');

    if (!filename) {
        document.getElementById('content').innerHTML =
            '<div class="loading">No file specified.</div>';
    } else {
        loadDataset(filename);
    }

    async function loadDataset(filename) {
        document.getElementById('page-title').textContent = filename;

        try {
            const response = await fetch(`/api/datasets/${filename}/full`);
            const data = await response.json();

            if (filename.endsWith('.csv')) {
                renderCSV(data);
            } else {
                renderJSON(data);
            }
        } catch (err) {
            document.getElementById('content').innerHTML =
                '<div class="loading">Could not load dataset.</div>';
        }
    }

    function renderCSV(data) {
        headers = data.headers || [];
        allRows = data.rows || [];

        document.getElementById('meta-rows').textContent = allRows.length;
        document.getElementById('meta-cols').textContent = headers.length;
        document.getElementById('meta-size').textContent =
            Math.round(JSON.stringify(data).length / 1024 * 10) / 10;
        document.getElementById('meta-bar').style.display = 'flex';
        document.getElementById('search-bar').style.display = 'block';
        document.getElementById('page-meta').textContent =
            `${allRows.length} rows × ${headers.length} columns`;

        renderTable(allRows);
    }

    function renderTable(rows) {
        if (rows.length === 0) {
            document.getElementById('content').innerHTML =
                '<div class="loading">No rows to display.</div>';
            return;
        }

        document.getElementById('content').innerHTML = `
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th style="color:#555; width:50px;">#</th>
                            ${headers.map((h, i) => `
                                <th onclick="sortBy(${i})">${h} ↕</th>
                            `).join('')}
                        </tr>
                    </thead>
                    <tbody>
                        ${rows.map((row, i) => `
                            <tr>
                                <td style="color:#444;">${i + 1}</td>
                                ${row.map(cell => `<td>${cell}</td>`).join('')}
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
            <div class="row-count">Showing ${rows.length} of ${allRows.length} rows</div>
        `;
    }

    function renderJSON(data) {
        const content = typeof data.content === 'string'
            ? data.content
            : JSON.stringify(data.content, null, 2);
        document.getElementById('content').innerHTML = `
            <div class="json-view">${content}</div>
        `;
        document.getElementById('page-meta').textContent = 'JSON dataset';
    }

    function filterRows() {
        const keyword = document.getElementById('search-input').value.toLowerCase();
        if (!keyword) { renderTable(allRows); return; }
        const filtered = allRows.filter(row =>
            row.some(cell => cell.toLowerCase().includes(keyword))
        );
        renderTable(filtered);
    }

    function sortBy(colIndex) {
        if (lastSortCol === colIndex) {
            sortAsc = !sortAsc;
        } else {
            sortAsc = true;
            lastSortCol = colIndex;
        }

        const sorted = [...allRows].sort((a, b) => {
            const valA = a[colIndex] || '';
            const valB = b[colIndex] || '';
            const numA = parseFloat(valA);
            const numB = parseFloat(valB);

            if (!isNaN(numA) && !isNaN(numB)) {
                return sortAsc ? numA - numB : numB - numA;
            }
            return sortAsc ? valA.localeCompare(valB) : valB.localeCompare(valA);
        });

        renderTable(sorted);
    }
</script>

</body>
</html>
