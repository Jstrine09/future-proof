<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataset — JumzysNotes</title>
    <style>
        /* ── TOKENS (shared with index.html) ────────────────── */
        :root {
            --color-bg:           oklch(11% 0.008 65);
            --color-surface:      oklch(17% 0.012 62);
            --color-surface-2:    oklch(22% 0.014 60);
            --color-border:       oklch(28% 0.016 60);
            --color-text-dim:     oklch(50% 0.008 68);
            --color-text-body:    oklch(82% 0.007 72);
            --color-text-display: oklch(93% 0.005 72);
            --color-amber:        oklch(75% 0.13 75);
            --color-sage:         oklch(58% 0.06 150);
            --color-sage-bg:      oklch(17% 0.03 150);
            --color-sage-border:  oklch(26% 0.05 150);
            --color-sage-dim:     oklch(40% 0.04 150);
            --font-display: Georgia, 'Times New Roman', serif;
            --font-body:    -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            --font-mono:    'SF Mono', 'Fira Code', 'Consolas', monospace;
            --text-xs:   0.72rem;
            --text-sm:   0.82rem;
            --text-base: 0.9rem;
            --text-md:   1rem;
            --text-lg:   1.3rem;
            --text-xl:   1.7rem;
            --space-1: 4px;  --space-2: 8px;   --space-3: 12px;
            --space-4: 16px; --space-6: 24px;  --space-8: 32px;
            --ease-out: cubic-bezier(0.25, 1, 0.5, 1);
            --dur-fast: 150ms;
        }

        /* ── RESET ──────────────────────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        /* ── BASE ───────────────────────────────────────────── */
        body {
            font-family: var(--font-body);
            background: var(--color-bg);
            color: var(--color-text-body);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── HEADER ─────────────────────────────────────────── */
        header {
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-sage-border);
            padding: var(--space-4) var(--space-8);
            display: flex;
            align-items: center;
            gap: var(--space-4);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .back-link {
            background: none;
            border: 1px solid var(--color-border);
            color: var(--color-text-dim);
            font-family: var(--font-body);
            font-size: var(--text-sm);
            padding: var(--space-2) var(--space-3);
            border-radius: var(--space-2);
            cursor: pointer;
            text-decoration: none;
            transition: border-color var(--dur-fast) var(--ease-out),
                        color var(--dur-fast) var(--ease-out);
            white-space: nowrap;
        }

        .back-link:hover { border-color: var(--color-sage); color: var(--color-sage); }

        .header-info { flex: 1; min-width: 0; }

        .header-info h1 {
            font-family: var(--font-display);
            font-size: var(--text-lg);
            color: var(--color-text-display);
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-info .sub {
            font-size: var(--text-xs);
            color: var(--color-text-dim);
            margin-top: 2px;
        }

        /* ── CONTAINER ──────────────────────────────────────── */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--space-6) var(--space-8);
        }

        /* ── META BAR ───────────────────────────────────────── */
        .meta-bar {
            display: flex;
            gap: var(--space-6);
            margin-bottom: var(--space-4);
            padding-bottom: var(--space-4);
            border-bottom: 1px solid var(--color-border);
        }

        .meta-item {
            display: flex;
            align-items: baseline;
            gap: var(--space-2);
        }

        .meta-value {
            font-family: var(--font-display);
            font-size: var(--text-md);
            color: var(--color-sage);
            font-variant-numeric: tabular-nums;
        }

        .meta-label {
            font-size: var(--text-xs);
            color: var(--color-text-dim);
        }

        /* ── SEARCH ─────────────────────────────────────────── */
        .search-bar {
            margin-bottom: var(--space-4);
        }

        .search-bar input {
            width: 100%;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--space-2);
            color: var(--color-text-body);
            font-family: var(--font-body);
            font-size: var(--text-base);
            padding: var(--space-3) var(--space-4);
            outline: none;
            transition: border-color var(--dur-fast) var(--ease-out),
                        box-shadow var(--dur-fast) var(--ease-out);
        }

        .search-bar input:focus {
            border-color: var(--color-sage);
            box-shadow: 0 0 0 2px oklch(58% 0.06 150 / 0.15);
        }

        .search-bar input::placeholder { color: var(--color-text-dim); }

        /* ── TABLE ──────────────────────────────────────────── */
        .table-wrapper {
            overflow-x: auto;
            border: 1px solid var(--color-border);
            border-radius: var(--space-2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--text-sm);
        }

        thead tr {
            background: var(--color-surface-2);
            position: sticky;
            top: 57px; /* accounts for header height */
        }

        th {
            padding: var(--space-3) var(--space-4);
            color: var(--color-text-dim);
            text-align: left;
            border-bottom: 1px solid var(--color-border);
            border-right: 1px solid var(--color-border);
            white-space: nowrap;
            cursor: pointer;
            font-size: var(--text-xs);
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            transition: color var(--dur-fast) var(--ease-out),
                        background var(--dur-fast) var(--ease-out);
            user-select: none;
        }

        th:last-child { border-right: none; }
        th:hover { color: var(--color-sage); background: var(--color-sage-bg); }
        th.sort-active { color: var(--color-sage); }

        th .sort-indicator { margin-left: var(--space-1); opacity: 0.5; }
        th.sort-active .sort-indicator { opacity: 1; }

        td {
            padding: var(--space-2) var(--space-4);
            border-bottom: 1px solid var(--color-border);
            border-right: 1px solid var(--color-border);
            color: var(--color-text-body);
            font-size: var(--text-sm);
            max-width: 320px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        td:last-child { border-right: none; }

        tr:last-child td { border-bottom: none; }

        tbody tr:nth-child(even) td { background: var(--color-surface); }
        tbody tr:hover td { background: var(--color-sage-bg) !important; }

        .row-num {
            color: var(--color-text-dim);
            font-size: var(--text-xs);
            text-align: right;
            font-variant-numeric: tabular-nums;
            width: 48px;
            min-width: 48px;
        }

        /* ── JSON VIEW ──────────────────────────────────────── */
        .json-view {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--space-2);
            padding: var(--space-6);
            white-space: pre-wrap;
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            color: var(--color-text-body);
            max-height: 72vh;
            overflow-y: auto;
            line-height: 1.6;
        }

        /* ── FOOTER ROW COUNT ───────────────────────────────── */
        .row-count {
            font-size: var(--text-xs);
            color: var(--color-text-dim);
            margin-top: var(--space-3);
            text-align: right;
        }

        /* ── STATES ─────────────────────────────────────────── */
        .loading, .empty {
            text-align: center;
            padding: 64px;
            color: var(--color-text-dim);
            font-size: var(--text-sm);
        }

        /* ── SCROLLBAR ──────────────────────────────────────── */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--color-text-dim); }

        /* ── REDUCED MOTION ─────────────────────────────────── */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

<header>
    <a href="/" class="back-link">← Back</a>
    <div class="header-info">
        <h1 id="page-title">Loading…</h1>
        <div class="sub" id="page-sub"></div>
    </div>
</header>

<div class="container">
    <div class="meta-bar" id="meta-bar" style="display:none;">
        <div class="meta-item">
            <span class="meta-value" id="meta-rows">—</span>
            <span class="meta-label">rows</span>
        </div>
        <div class="meta-item">
            <span class="meta-value" id="meta-cols">—</span>
            <span class="meta-label">columns</span>
        </div>
        <div class="meta-item">
            <span class="meta-value" id="meta-size">—</span>
            <span class="meta-label">KB</span>
        </div>
    </div>

    <div class="search-bar" id="search-bar" style="display:none;">
        <input type="text" id="search-input" placeholder="Filter rows…" oninput="filterRows()">
    </div>

    <div id="content">
        <div class="loading">Loading dataset…</div>
    </div>
</div>

<script>
    let allRows = [];
    let headers = [];
    let sortAsc = true;
    let lastSortCol = -1;

    const params = new URLSearchParams(window.location.search);
    const filename = params.get('file');

    if (!filename) {
        document.getElementById('content').innerHTML = '<div class="empty">No file specified.</div>';
    } else {
        loadDataset(filename);
    }

    async function loadDataset(filename) {
        document.getElementById('page-title').textContent = filename;
        document.title = filename + ' — JumzysNotes';
        try {
            const response = await fetch(`/api/datasets/${encodeURIComponent(filename)}/full`);
            const data = await response.json();
            if (filename.endsWith('.json')) renderJSON(data);
            else renderCSV(data);
        } catch {
            document.getElementById('content').innerHTML =
                '<div class="empty">Could not load dataset.</div>';
        }
    }

    function renderCSV(data) {
        headers = data.headers || [];
        allRows = data.rows || [];

        document.getElementById('meta-rows').textContent = allRows.length.toLocaleString();
        document.getElementById('meta-cols').textContent = headers.length;
        document.getElementById('meta-size').textContent =
            (JSON.stringify(data).length / 1024).toFixed(1);
        document.getElementById('meta-bar').style.display = 'flex';
        document.getElementById('search-bar').style.display = 'block';
        document.getElementById('page-sub').textContent =
            `${allRows.length.toLocaleString()} rows × ${headers.length} columns`;

        renderTable(allRows);
    }

    function renderTable(rows) {
        if (rows.length === 0) {
            document.getElementById('content').innerHTML =
                '<div class="empty">No rows match your filter.</div>';
            return;
        }

        document.getElementById('content').innerHTML = `
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th class="row-num" style="cursor:default;">#</th>
                            ${headers.map((h, i) => `
                                <th class="${lastSortCol === i ? 'sort-active' : ''}"
                                    onclick="sortBy(${i})">
                                    ${escapeHtml(h)}
                                    <span class="sort-indicator">${
                                        lastSortCol === i ? (sortAsc ? '↑' : '↓') : '↕'
                                    }</span>
                                </th>
                            `).join('')}
                        </tr>
                    </thead>
                    <tbody>
                        ${rows.map((row, i) => `
                            <tr>
                                <td class="row-num">${i + 1}</td>
                                ${row.map(cell => `<td title="${escapeHtml(String(cell))}">${escapeHtml(String(cell))}</td>`).join('')}
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
            <div class="row-count">Showing ${rows.length.toLocaleString()} of ${allRows.length.toLocaleString()} rows</div>
        `;
    }

    function renderJSON(data) {
        const content = typeof data.content === 'string'
            ? data.content
            : JSON.stringify(data.content, null, 2);
        document.getElementById('content').innerHTML =
            `<div class="json-view">${escapeHtml(content)}</div>`;
        document.getElementById('page-sub').textContent = 'JSON dataset';
    }

    function filterRows() {
        const keyword = document.getElementById('search-input').value.toLowerCase();
        if (!keyword) { renderTable(allRows); return; }
        renderTable(allRows.filter(row =>
            row.some(cell => String(cell).toLowerCase().includes(keyword))
        ));
    }

    function sortBy(colIndex) {
        if (lastSortCol === colIndex) sortAsc = !sortAsc;
        else { sortAsc = true; lastSortCol = colIndex; }

        const sorted = [...allRows].sort((a, b) => {
            const vA = a[colIndex] ?? '', vB = b[colIndex] ?? '';
            const nA = parseFloat(vA), nB = parseFloat(vB);
            if (!isNaN(nA) && !isNaN(nB)) return sortAsc ? nA - nB : nB - nA;
            return sortAsc
                ? String(vA).localeCompare(String(vB))
                : String(vB).localeCompare(String(vA));
        });

        renderTable(sorted);
    }

    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }
</script>

</body>
</html>
